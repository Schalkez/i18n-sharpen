name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint and tests
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test

      - name: Swap README logo to light theme for npm
        run: |
          node -e "
            const fs = require('fs');
            let md = fs.readFileSync('README.md', 'utf8');
            md = md.replace(
              /<picture>[\s\S]*?<\/picture>/,
              '<img alt=\"i18n / sharpen\" src=\"https://raw.githubusercontent.com/Schalkez/i18n-sharpen/master/assets/logo/logo-light.svg\" width=\"264\" height=\"64\">'
            );
            fs.writeFileSync('README.md', md);
          "

      - name: Publish to NPM
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPMTOKEN || vars.NPM_TOKEN || vars.NPMTOKEN }}
