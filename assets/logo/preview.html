<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>i18n / sharpen — logo</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
    .panel{padding:48px}
    .light{background:#fff}
    .dark{background:#0B1020}
    h2{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#94A3B8;margin-bottom:40px}
    section{margin-bottom:40px}
    section h3{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#64748B;margin-bottom:16px}
    .lockup{display:flex;align-items:center;gap:18px}
    .sizes{display:flex;align-items:flex-end;gap:16px}
    img{display:block}
  </style>
</head>
<body>
  <div class="panel light">
    <h2>Light background</h2>
    <section><h3>Lockup — icon + wordmark</h3>
      <div class="lockup"><img src="icon.svg" height="56" alt=""><img src="logo-light.svg" height="44" alt="i18n / sharpen"></div>
    </section>
    <section><h3>Wordmark</h3><img src="logo-light.svg" height="48" alt="i18n / sharpen"></section>
    <section><h3>Icon — sizes</h3>
      <div class="sizes"><img src="icon.svg" height="64"><img src="icon.svg" height="48"><img src="icon.svg" height="32"><img src="icon.svg" height="24"><img src="icon.svg" height="16"></div>
    </section>
  </div>
  <div class="panel dark">
    <h2>Dark background</h2>
    <section><h3>Lockup — icon + wordmark</h3>
      <div class="lockup"><img src="icon.svg" height="56" alt=""><img src="logo-dark.svg" height="44" alt="i18n / sharpen"></div>
    </section>
    <section><h3>Wordmark</h3><img src="logo-dark.svg" height="48" alt="i18n / sharpen"></section>
    <section><h3>Icon — sizes</h3>
      <div class="sizes"><img src="icon.svg" height="64"><img src="icon.svg" height="48"><img src="icon.svg" height="32"><img src="icon.svg" height="24"><img src="icon.svg" height="16"></div>
    </section>
  </div>
</body>
</html>
