<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>theme-proof logo options</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:ui-sans-serif,system-ui,sans-serif;display:grid;grid-template-columns:1fr 1fr}
  .col{min-height:100vh;padding:48px}
  .l{background:#ffffff}.d{background:#0d1117}
  h2{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8b949e;margin-bottom:36px}
  .opt{margin-bottom:48px}
  .name{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#8b949e;margin-bottom:14px}
  svg{display:block}
</style></head><body>

<!-- LIGHT -->
<div class="col l">
  <h2>On GitHub light (#fff)</h2>

  <div class="opt"><div class="name">A · Dark plate lockup</div>
    <svg width="300" viewBox="0 0 320 84" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="pa" x1="0" y1="0" x2="320" y2="84" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#1E293B"/><stop offset="1" stop-color="#0F172A"/></linearGradient></defs>
      <rect x="1" y="1" width="318" height="82" rx="18" fill="url(#pa)"/>
      <rect x="1.5" y="1.5" width="317" height="81" rx="17.5" fill="none" stroke="#fff" stroke-opacity=".09"/>
      <text x="160" y="54" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="800" letter-spacing="-1.2"><tspan fill="#F8FAFC">i</tspan><tspan fill="#F59E0B">18</tspan><tspan fill="#F8FAFC">n</tspan><tspan fill="#F59E0B" font-weight="900" font-size="37"> / </tspan><tspan fill="#F8FAFC">sharpen</tspan></text>
    </svg>
  </div>

  <div class="opt"><div class="name">B · Universal slate + amber (transparent)</div>
    <svg width="264" viewBox="0 0 264 64" xmlns="http://www.w3.org/2000/svg">
      <text x="2" y="44" font-family="Inter,system-ui,sans-serif" font-size="40" font-weight="800" letter-spacing="-1.5"><tspan fill="#475569">i</tspan><tspan fill="#F59E0B">18</tspan><tspan fill="#475569">n</tspan><tspan fill="#F59E0B" font-weight="900" font-size="46"> / </tspan><tspan fill="#475569">sharpen</tspan></text>
    </svg>
  </div>
</div>

<!-- DARK -->
<div class="col d">
  <h2>On GitHub dark (#0d1117)</h2>

  <div class="opt"><div class="name">A · Dark plate lockup</div>
    <svg width="300" viewBox="0 0 320 84" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="pb" x1="0" y1="0" x2="320" y2="84" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#1E293B"/><stop offset="1" stop-color="#0F172A"/></linearGradient></defs>
      <rect x="1" y="1" width="318" height="82" rx="18" fill="url(#pb)"/>
      <rect x="1.5" y="1.5" width="317" height="81" rx="17.5" fill="none" stroke="#fff" stroke-opacity=".14"/>
      <text x="160" y="54" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="32" font-weight="800" letter-spacing="-1.2"><tspan fill="#F8FAFC">i</tspan><tspan fill="#F59E0B">18</tspan><tspan fill="#F8FAFC">n</tspan><tspan fill="#F59E0B" font-weight="900" font-size="37"> / </tspan><tspan fill="#F8FAFC">sharpen</tspan></text>
    </svg>
  </div>

  <div class="opt"><div class="name">B · Universal slate + amber (transparent)</div>
    <svg width="264" viewBox="0 0 264 64" xmlns="http://www.w3.org/2000/svg">
      <text x="2" y="44" font-family="Inter,system-ui,sans-serif" font-size="40" font-weight="800" letter-spacing="-1.5"><tspan fill="#94A3B8">i</tspan><tspan fill="#F59E0B">18</tspan><tspan fill="#94A3B8">n</tspan><tspan fill="#F59E0B" font-weight="900" font-size="46"> / </tspan><tspan fill="#94A3B8">sharpen</tspan></text>
    </svg>
  </div>
</div>

</body></html>
